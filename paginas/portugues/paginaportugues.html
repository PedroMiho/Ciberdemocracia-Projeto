<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos de Português!</title>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primaria: #6C5CE7;
      --texto: #4A4A68;
    }

    * {
      font-family: 'Baloo 2', cursive;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #D4F1FF 0%, transparent 50%),
        linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 🔇 Botão de som */
    .botao-som {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 500;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(108, 92, 231, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .botao-som:hover {
      transform: scale(1.08);
    }

    .botao-som:active {
      transform: scale(0.92);
    }

    .botao-som svg {
      width: 30px;
      height: 30px;
    }

    .botao-som.mudo {
      background: #FFE3E1;
    }

    /* ⬅️ Botão Voltar */
    .botao-voltar {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 500;
      height: 56px;
      padding: 0 22px 0 16px;
      border-radius: 28px;
      border: none;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--primaria);
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(108, 92, 231, 0.25);
      transition: transform 0.18s ease;
    }

    .botao-voltar:hover {
      transform: scale(1.05);
    }

    .botao-voltar:active {
      transform: scale(0.95);
    }

    .botao-voltar svg {
      width: 26px;
      height: 26px;
    }

    /* Cabeçalho com o Pim */
    .topo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      max-width: 720px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .pim-circulo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35);
      flex-shrink: 0;
    }

    .pim-circulo svg {
      width: 42px;
      height: 42px;
      animation: flutua 3.5s ease-in-out infinite;
    }

    .pim-circulo.falando svg {
      animation: pula 0.45s ease-in-out infinite;
    }

    @keyframes flutua {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes pula {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-4px) scale(1.08);
      }
    }

    .titulo {
      color: var(--texto);
      font-size: 26px;
      font-weight: 800;
    }

    .subtitulo {
      color: #8A87A8;
      font-size: 17px;
      font-weight: 600;
    }

    /* Grade de jogos (3 cards) */
    .grade {
      max-width: 820px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 720px) {
      .grade {
        grid-template-columns: 1fr;
        max-width: 380px;
      }
    }

    .card-jogo {
      background: #fff;
      border-radius: 28px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      box-shadow: 0 12px 30px rgba(108, 92, 231, 0.15);
      transition: transform 0.18s ease, box-shadow 0.18s ease, outline 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      position: relative;
    }

    .card-jogo:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 40px rgba(108, 92, 231, 0.25);
    }

    .card-jogo:active {
      transform: translateY(-2px) scale(0.98);
    }

    .card-jogo.destaque {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 20px 44px rgba(108, 92, 231, 0.35);
      outline: 4px solid #FDCB6E;
      outline-offset: 4px;
    }

    .icone-circulo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      line-height: 1;
    }

    .nome-jogo {
      font-size: 21px;
      font-weight: 700;
      color: var(--texto);
      line-height: 1.2;
    }

    /* Cores por jogo */
    .jogo-inicial .icone-circulo { background: #D4F1FF; }
    .jogo-inicial { border-bottom: 6px solid #0984E3; }

    .jogo-descubra .icone-circulo { background: #FFE3E1; }
    .jogo-descubra { border-bottom: 6px solid #FF7675; }

    .jogo-montar .icone-circulo { background: #E8E4FF; }
    .jogo-montar { border-bottom: 6px solid #6C5CE7; }

    /* Estrelinha de "concluído" (opcional) */
    .estrela-feito {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 26px;
      display: none;
    }

    .card-jogo.concluido .estrela-feito {
      display: block;
    }
  </style>
</head>

<body>

  <!-- ⬅️ Voltar -->
  <button class="botao-voltar" id="botaoVoltar" title="Voltar">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 5 L8 12 L15 19" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"
        stroke-linejoin="round" />
    </svg>
    Voltar
  </button>

  <!-- 🔇 Som -->
  <button class="botao-som" id="botaoSom" title="Ligar ou desligar a voz"></button>

  <!-- CABEÇALHO -->
  <div class="topo">
    <div class="pim-circulo" id="pimCirculo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
        <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
        <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff" />
        <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
        <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
        <circle cx="40" cy="40" r="3" fill="#fff" />
        <circle cx="64" cy="40" r="3" fill="#fff" />
        <circle cx="28" cy="54" r="5" fill="#FFB8C4" opacity="0.7" />
        <circle cx="72" cy="54" r="5" fill="#FFB8C4" opacity="0.7" />
        <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none" />
        <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE" />
        <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
      </svg>
    </div>
    <div>
      <div class="titulo">Vamos ler e escrever!</div>
      <div class="subtitulo">Escolha um jogo de palavras 👇</div>
    </div>
  </div>

  <!-- GRADE DE JOGOS -->
  <div class="grade">

    <!-- Jogo 1: Descubra a Inicial -->
    <button class="card-jogo jogo-inicial" data-jogo="descubrainicial" data-nome="Descubra a Inicial"
      data-link="jogo-descubrainicial.html">
      <span class="estrela-feito">⭐</span>
      <div class="icone-circulo">🅰️</div>
      <div class="nome-jogo">Descubra<br>a Inicial</div>
    </button>

    <!-- Jogo 2: Descubra a Palavra -->
    <button class="card-jogo jogo-descubra" data-jogo="descubrapalavra" data-nome="Descubra a Palavra"
      data-link="jogo-descubrapalavra.html">
      <span class="estrela-feito">⭐</span>
      <div class="icone-circulo">🔍</div>
      <div class="nome-jogo">Descubra<br>a Palavra</div>
    </button>

    <!-- Jogo 3: Monte a Palavra -->
    <button class="card-jogo jogo-montar" data-jogo="montepalavra" data-nome="Monte a Palavra"
      data-link="jogo-montepalavra.html">
      <span class="estrela-feito">⭐</span>
      <div class="icone-circulo">🔡</div>
      <div class="nome-jogo">Monte a<br>Palavra</div>
    </button>

  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script>
    // ===== CREDENCIAIS (TROQUE pela sua chave!) =====
    const AZURE_KEY = "7YseDwXlpfBRO2meYxBwULsbO5mNhv4uqxdUhXtwef1jRBmcGzXeJQQJ99CFACHrzpqXJ3w3AAAYACOG87Cv";
    const AZURE_REGION = "northcentralus";
    const VOZ = "pt-BR-ThalitaNeural";
    // ================================================

    const pimCirculo = document.getElementById('pimCirculo');
    const botaoSom = document.getElementById('botaoSom');
    const botaoVoltar = document.getElementById('botaoVoltar');

    let navegando = false;
    let somLigado = localStorage.getItem('somLigado') !== 'false';

    const ICONE_SOM_LIGADO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#6C5CE7"/>
        <path d="M16 9 a4 4 0 0 1 0 6" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M18.5 6.5 a8 8 0 0 1 0 11" stroke="#A29BFE" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>`;

    const ICONE_SOM_MUDO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#D63031"/>
        <line x1="16" y1="9" x2="22" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="16" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
      </svg>`;

    function atualizarBotaoSom() {
      botaoSom.innerHTML = somLigado ? ICONE_SOM_LIGADO : ICONE_SOM_MUDO;
      botaoSom.classList.toggle('mudo', !somLigado);
    }
    atualizarBotaoSom();

    botaoSom.addEventListener('click', () => {
      somLigado = !somLigado;
      localStorage.setItem('somLigado', somLigado);
      atualizarBotaoSom();
    });

    function pausa(ms) { return new Promise(r => setTimeout(r, ms)); }

    function falar(texto) {
      return new Promise(resolve => {
        if (!somLigado) { resolve(); return; }

        pimCirculo.classList.add('falando');
        const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
        speechConfig.speechSynthesisVoiceName = VOZ;
        const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);

        let finalizado = false;
        function finalizar() {
          if (finalizado) return;
          finalizado = true;
          pimCirculo.classList.remove('falando');
          try { synthesizer.close(); } catch (e) {}
          resolve();
        }

        const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='0%' pitch='+6%'>${texto}</prosody>
            </voice>
          </speak>`;

        synthesizer.speakSsmlAsync(ssml,
          (result) => {
            if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) {
              const duracaoMs = result.audioDuration / 10000;
              setTimeout(finalizar, duracaoMs + 300);
            } else { finalizar(); }
          },
          (err) => { console.error('Erro na fala:', err); finalizar(); }
        );
      });
    }

    // 🔆 Destaca cada card enquanto o Pim apresenta
    function destacar(jogo) {
      document.querySelectorAll('.card-jogo').forEach(c => c.classList.remove('destaque'));
      const card = document.querySelector(`.card-jogo[data-jogo="${jogo}"]`);
      if (card) card.classList.add('destaque');
    }

    function limparDestaque() {
      document.querySelectorAll('.card-jogo').forEach(c => c.classList.remove('destaque'));
    }

    // 🎤 Apresentação do Pim ao abrir a tela
    async function apresentar() {
      await falar('Vamos brincar com as palavras! Escolha um jogo.');
      await pausa(300);

      destacar('descubrainicial');
      await falar('Aqui você descobre a primeira letra.');
      destacar('descubrapalavra');
      await falar('Aqui você descobre a palavra escondida.');
      destacar('montepalavra');
      await falar('E aqui você monta a palavra do desenho.');

      limparDestaque();
    }

    // ✅ Marca jogos já concluídos (lê do localStorage)
    function marcarConcluidos() {
      document.querySelectorAll('.card-jogo').forEach(card => {
        const feito = localStorage.getItem('jogo_' + card.dataset.jogo + '_concluido');
        if (feito === 'true') card.classList.add('concluido');
      });
    }

    // 🚀 Vai para o jogo
    async function abrirJogo(card) {
      if (navegando) return;
      navegando = true;
      limparDestaque();
      card.classList.add('destaque');

      await falar(`Vamos jogar ${card.dataset.nome}!`);
      await pausa(400);
      window.location.href = `jogos/${card.dataset.link}`;
    }

    document.querySelectorAll('.card-jogo').forEach(card => {
      card.addEventListener('click', () => abrirJogo(card));
    });

    // ⬅️ Voltar para a tela de matérias
    botaoVoltar.addEventListener('click', () => {
      window.location.href = '../../index.html'; // ajuste o caminho se precisar
    });

    // Início
    marcarConcluidos();
    apresentar();
  </script>

</body>

</html>
