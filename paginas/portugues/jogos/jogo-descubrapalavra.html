<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligue à Palavra</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primaria: #6C5CE7;
            --texto: #4A4A68;
        }

        * {
            font-family: 'Baloo 2', cursive;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #D4F1FF 0%, transparent 50%),
                linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .botao-som,
        .botao-voltar {
            position: fixed;
            top: 18px;
            z-index: 500;
            border: none;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.25);
            transition: transform 0.18s ease;
        }

        .botao-som {
            right: 18px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .botao-som svg {
            width: 30px;
            height: 30px;
        }

        .botao-som.mudo {
            background: #FFE3E1;
        }

        .botao-voltar {
            left: 18px;
            height: 56px;
            padding: 0 22px 0 16px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primaria);
            font-size: 18px;
            font-weight: 700;
        }

        .botao-som:hover,
        .botao-voltar:hover {
            transform: scale(1.06);
        }

        .botao-som:active,
        .botao-voltar:active {
            transform: scale(0.92);
        }

        .botao-voltar svg {
            width: 26px;
            height: 26px;
        }

        .pim-circulo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35);
            margin-bottom: 10px;
        }

        .pim-circulo svg {
            width: 38px;
            height: 38px;
        }

        .pim-circulo.falando svg {
            animation: pula 0.45s ease-in-out infinite;
        }

        @keyframes pula {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-4px) scale(1.08);
            }
        }

        .palco {
            background: #fff;
            border-radius: 36px;
            padding: 24px 22px 28px;
            box-shadow: 0 16px 44px rgba(108, 92, 231, 0.18);
            max-width: 660px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .titulo-jogo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primaria);
        }

        .estrelas {
            display: flex;
            gap: 8px;
        }

        .estrela {
            font-size: 24px;
            filter: grayscale(1);
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .estrela.ganha {
            filter: none;
            opacity: 1;
            transform: scale(1.2);
        }

        .mensagem {
            font-size: 21px;
            font-weight: 700;
            color: var(--texto);
            min-height: 28px;
        }

        .arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 14px;
        }

        .lado-objeto {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 130px;
        }

        .objeto {
            font-size: 90px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: transform 0.2s ease;
            line-height: 1;
        }

        .objeto.selecionado {
            transform: scale(1.15);
            filter: drop-shadow(0 0 12px #FDCB6E);
        }

        .objeto.arrastando {
            cursor: grabbing;
            z-index: 1000;
            position: fixed;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .objeto {
                font-size: 64px;
            }

            .lado-objeto {
                min-width: 84px;
            }
        }

        .lado-palavras {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 320px;
        }

        .palavra-alvo {
            min-height: 70px;
            border-radius: 22px;
            border: 4px dashed #C5BEFF;
            background: #F5F3FF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 800;
            color: var(--primaria);
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 10px 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .palavra-alvo.sobre {
            border-color: #6C5CE7;
            background: #E8E4FF;
            transform: scale(1.04);
        }

        .palavra-alvo.certa {
            border-style: solid;
            border-color: #00B894;
            background: #D5F5EC;
            color: #009975;
            animation: pulinho 0.5s ease;
        }

        .palavra-alvo.errada {
            animation: tremor 0.4s ease;
            border-color: #FF7675;
        }

        @keyframes pulinho {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        @keyframes tremor {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .arena.travado {
            pointer-events: none;
        }

        .controles {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            border-radius: 26px;
            padding: 14px 28px;
            font-size: 19px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.16s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .btn-iniciar {
            background: linear-gradient(160deg, #00B894 0%, #009975 100%);
        }

        .btn-repetir {
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
        }

        .btn-ouvir {
            background: linear-gradient(160deg, #74B9FF 0%, #0984E3 100%);
        }

        .festa {
            font-size: 56px;
            display: none;
        }

        .festa.aparece {
            display: block;
            animation: festa 0.8s ease infinite alternate;
        }

        @keyframes festa {
            0% {
                transform: scale(1) rotate(-6deg);
            }

            100% {
                transform: scale(1.15) rotate(6deg);
            }
        }
    </style>
</head>

<body>

    <button class="botao-voltar" id="botaoVoltar" title="Voltar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 5 L8 12 L15 19" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
        Voltar
    </button>

    <button class="botao-som" id="botaoSom" title="Ligar ou desligar a voz"></button>

    <div class="pim-circulo" id="pimCirculo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
            <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
            <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff" />
            <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
            <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
            <circle cx="40" cy="40" r="3" fill="#fff" />
            <circle cx="64" cy="40" r="3" fill="#fff" />
            <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none" />
            <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE" />
            <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
        </svg>
    </div>

    <div class="palco">

        <div class="titulo-jogo">Ligue à Palavra 📖</div>

        <div class="estrelas" id="estrelas"></div>

        <div class="mensagem" id="mensagem">Ligue o objeto à palavra certa!</div>

        <div class="arena" id="arena">
            <div class="lado-objeto">
                <div class="objeto" id="objeto" draggable="false"></div>
            </div>
            <div class="lado-palavras" id="palavras"></div>
        </div>

        <div class="festa" id="festa">🎉🌟🎉</div>

        <div class="controles">
            <button class="btn btn-iniciar" id="btnIniciar">▶️ Começar</button>
            <button class="btn btn-ouvir" id="btnOuvir" style="display:none;">🔊 Ouvir de novo</button>
            <button class="btn btn-repetir" id="btnRepetir" style="display:none;">🔁 Jogar de novo</button>
        </div>

    </div>

    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script>
        // ===== CREDENCIAIS (TROQUE pela sua chave!) =====
        const AZURE_KEY = "7YseDwXlpfBRO2meYxBwULsbO5mNhv4uqxdUhXtwef1jRBmcGzXeJQQJ99CFACHrzpqXJ3w3AAAYACOG87Cv";
        const AZURE_REGION = "northcentralus";
        const VOZ = "pt-BR-ThalitaNeural";
        // ================================================

        const pimCirculo = document.getElementById('pimCirculo');
        const botaoSom = document.getElementById('botaoSom');
        const botaoVoltar = document.getElementById('botaoVoltar');
        const arena = document.getElementById('arena');
        const objetoEl = document.getElementById('objeto');
        const palavrasEl = document.getElementById('palavras');
        const mensagem = document.getElementById('mensagem');
        const estrelasEl = document.getElementById('estrelas');
        const festa = document.getElementById('festa');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnOuvir = document.getElementById('btnOuvir');
        const btnRepetir = document.getElementById('btnRepetir');

        let somLigado = localStorage.getItem('somLigado') !== 'false';
        let rodando = false;
        let podeResponder = false;

        // banco de objetos: emoji + palavra
        const OBJETOS = [
            { emoji: '✈️', palavra: 'avião' },
            { emoji: '🍌', palavra: 'banana' },
            { emoji: '🐱', palavra: 'gato' },
            { emoji: '🐶', palavra: 'cachorro' },
            { emoji: '🦆', palavra: 'pato' },
            { emoji: '🌙', palavra: 'lua' },
            { emoji: '🍎', palavra: 'maçã' },
            { emoji: '🐟', palavra: 'peixe' },
            { emoji: '🌸', palavra: 'flor' },
            { emoji: '🚗', palavra: 'carro' },
            { emoji: '🐘', palavra: 'elefante' },
            { emoji: '☀️', palavra: 'sol' },
            { emoji: '🐭', palavra: 'rato' },
            { emoji: '🦋', palavra: 'borboleta' },
            { emoji: '🍇', palavra: 'uva' },
            { emoji: '🐯', palavra: 'tigre' },
            { emoji: '🏠', palavra: 'casa' },
            { emoji: '🐝', palavra: 'abelha' },
        ];

        const TOTAL_RODADAS = 5;
        let rodadaAtual = 0;
        let objetoAtual = null;

        const ICONE_SOM_LIGADO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#6C5CE7"/>
        <path d="M16 9 a4 4 0 0 1 0 6" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M18.5 6.5 a8 8 0 0 1 0 11" stroke="#A29BFE" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>`;
        const ICONE_SOM_MUDO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#D63031"/>
        <line x1="16" y1="9" x2="22" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="16" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
      </svg>`;

        function atualizarBotaoSom() {
            botaoSom.innerHTML = somLigado ? ICONE_SOM_LIGADO : ICONE_SOM_MUDO;
            botaoSom.classList.toggle('mudo', !somLigado);
        }
        atualizarBotaoSom();
        botaoSom.addEventListener('click', () => {
            somLigado = !somLigado;
            localStorage.setItem('somLigado', somLigado);
            atualizarBotaoSom();
        });

        function pausa(ms) { return new Promise(r => setTimeout(r, ms)); }

        function falar(texto) {
            return new Promise(resolve => {
                if (!somLigado) { resolve(); return; }
                pimCirculo.classList.add('falando');
                const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
                speechConfig.speechSynthesisVoiceName = VOZ;
                const synth = new SpeechSDK.SpeechSynthesizer(speechConfig);
                let fim = false;
                function finalizar() {
                    if (fim) return; fim = true;
                    pimCirculo.classList.remove('falando');
                    try { synth.close(); } catch (e) { }
                    resolve();
                }
                const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='-6%' pitch='+6%'>${texto}</prosody>
            </voice>
          </speak>`;
                synth.speakSsmlAsync(ssml,
                    (r) => {
                        if (r.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted)
                            setTimeout(finalizar, r.audioDuration / 10000 + 250);
                        else finalizar();
                    },
                    (e) => { console.error(e); finalizar(); }
                );
            });
        }

        function embaralhar(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function criarEstrelas() {
            estrelasEl.innerHTML = '';
            for (let i = 0; i < TOTAL_RODADAS; i++) {
                const e = document.createElement('span');
                e.className = 'estrela';
                e.textContent = '⭐';
                e.dataset.i = i;
                estrelasEl.appendChild(e);
            }
        }
        function ganharEstrela(i) {
            const e = estrelasEl.querySelector(`.estrela[data-i="${i}"]`);
            if (e) e.classList.add('ganha');
        }

        // gera 3 palavras: a certa + 2 distratoras
        function gerarPalavras(certa) {
            const set = new Set([certa.palavra]);
            const outras = embaralhar(OBJETOS.filter(o => o.palavra !== certa.palavra));
            const lista = [certa];
            for (const o of outras) {
                if (lista.length >= 3) break;
                if (!set.has(o.palavra)) { set.add(o.palavra); lista.push(o); }
            }
            return embaralhar(lista);
        }

        async function falarEnunciado() {
            await falar(`Olha! Um ${objetoAtual.palavra}. Toque na palavra ${objetoAtual.palavra}, ou leve o objeto até ela.`);
        }

        async function montarRodada() {
            podeResponder = false;
            arena.classList.add('travado');
            festa.classList.remove('aparece');

            objetoAtual = OBJETOS[Math.floor(Math.random() * OBJETOS.length)];

            objetoEl.textContent = objetoAtual.emoji;
            objetoEl.classList.remove('selecionado', 'arrastando');
            objetoEl.style.position = '';
            objetoEl.style.left = '';
            objetoEl.style.top = '';
            mensagem.textContent = 'Ligue o objeto à palavra certa!';

            // monta as palavras-alvo
            palavrasEl.innerHTML = '';
            const palavras = gerarPalavras(objetoAtual);
            palavras.forEach(p => {
                const alvo = document.createElement('div');
                alvo.className = 'palavra-alvo';
                alvo.textContent = p.palavra;
                alvo.dataset.palavra = p.palavra;
                // toque: se objeto selecionado -> verifica; senão -> Pim lê a palavra
                alvo.addEventListener('click', () => {
                    if (objetoEl.classList.contains('selecionado')) {
                        verificar(p.palavra, alvo);
                    } else if (podeResponder) {
                        falar(p.palavra); // ajuda quem ainda não lê
                    }
                });
                palavrasEl.appendChild(alvo);
            });

            await pausa(300);
            await falarEnunciado();

            podeResponder = true;
            arena.classList.remove('travado');
        }

        async function verificar(palavra, alvoEl) {
            if (!podeResponder) return;
            podeResponder = false;
            arena.classList.add('travado');
            objetoEl.classList.remove('selecionado');

            if (palavra === objetoAtual.palavra) {
                alvoEl.classList.add('certa');
                ganharEstrela(rodadaAtual);
                mensagem.textContent = `Isso! É ${objetoAtual.palavra}! 🎉`;
                await falar(`Muito bem! Você ligou o objeto à palavra ${objetoAtual.palavra}!`);
                await pausa(500);
                rodadaAtual++;
                if (rodadaAtual >= TOTAL_RODADAS) terminarJogo();
                else montarRodada();
            } else {
                alvoEl.classList.add('errada');
                mensagem.textContent = 'Quase! Tente outra palavra 💜';
                await falar(`Essa palavra é ${palavra}. Vamos tentar de novo!`);
                await pausa(500);
                alvoEl.classList.remove('errada');
                podeResponder = true;
                arena.classList.remove('travado');
            }
        }

        // ===== TOQUE: seleciona objeto =====
        objetoEl.addEventListener('click', () => {
            if (!podeResponder || arrastou) return;
            objetoEl.classList.toggle('selecionado');
            mensagem.textContent = objetoEl.classList.contains('selecionado')
                ? 'Agora toque na palavra certa! 👆'
                : 'Ligue o objeto à palavra certa!';
        });

        // ===== ARRASTAR (mouse + toque) =====
        let arrastando = false, arrastou = false, offsetX = 0, offsetY = 0;

        function pegarPonto(e) {
            if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }
        function iniciarArraste(e) {
            if (!podeResponder) return;
            arrastando = true; arrastou = false;
            const r = objetoEl.getBoundingClientRect();
            const p = pegarPonto(e);
            offsetX = p.x - r.left; offsetY = p.y - r.top;
            objetoEl.classList.add('arrastando');
            objetoEl.style.left = r.left + 'px';
            objetoEl.style.top = r.top + 'px';
        }
        function moverArraste(e) {
            if (!arrastando) return;
            arrastou = true;
            const p = pegarPonto(e);
            objetoEl.style.left = (p.x - offsetX) + 'px';
            objetoEl.style.top = (p.y - offsetY) + 'px';
            if (e.cancelable) e.preventDefault();
            const alvo = palavraSob(p.x, p.y);
            document.querySelectorAll('.palavra-alvo').forEach(l => l.classList.remove('sobre'));
            if (alvo) alvo.classList.add('sobre');
        }
        function palavraSob(x, y) {
            for (const l of document.querySelectorAll('.palavra-alvo')) {
                const r = l.getBoundingClientRect();
                if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return l;
            }
            return null;
        }
        function soltarArraste(e) {
            if (!arrastando) return;
            arrastando = false;
            objetoEl.classList.remove('arrastando');
            let p;
            if (e.changedTouches && e.changedTouches[0])
                p = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            else p = { x: e.clientX, y: e.clientY };
            document.querySelectorAll('.palavra-alvo').forEach(l => l.classList.remove('sobre'));
            const alvo = palavraSob(p.x, p.y);
            objetoEl.style.position = ''; objetoEl.style.left = ''; objetoEl.style.top = '';
            if (arrastou && alvo) verificar(alvo.dataset.palavra, alvo);
            setTimeout(() => { arrastou = false; }, 50);
        }

        objetoEl.addEventListener('mousedown', iniciarArraste);
        document.addEventListener('mousemove', moverArraste);
        document.addEventListener('mouseup', soltarArraste);
        objetoEl.addEventListener('touchstart', iniciarArraste, { passive: false });
        document.addEventListener('touchmove', moverArraste, { passive: false });
        document.addEventListener('touchend', soltarArraste);

        async function terminarJogo() {
            rodando = false;
            mensagem.textContent = 'Você ligou tudo certinho! Parabéns! 🎉';
            festa.classList.add('aparece');
            objetoEl.textContent = '';
            palavrasEl.innerHTML = '';
            await falar('Parabéns! Você ligou todos os objetos às palavras certas! Você é incrível!');
            localStorage.setItem('jogo_ligarpalavra_concluido', 'true');
            btnOuvir.style.display = 'none';
            btnRepetir.style.display = 'flex';
            btnIniciar.disabled = false;
        }

        async function jogar() {
            rodando = true;
            rodadaAtual = 0;
            btnIniciar.disabled = true;
            btnRepetir.style.display = 'none';
            btnOuvir.style.display = 'flex';
            criarEstrelas();
            await falar('Vamos ligar os objetos às palavras! Toque no objeto e depois na palavra certa.');
            montarRodada();
        }

        btnIniciar.addEventListener('click', () => { if (!rodando) jogar(); });
        btnRepetir.addEventListener('click', () => jogar());
        btnOuvir.addEventListener('click', () => { if (rodando && objetoAtual) falarEnunciado(); });

        botaoVoltar.addEventListener('click', () => {
            rodando = false;
            window.location.href = '../paginaportugues.html';
        });

        // estado inicial
        criarEstrelas();
    </script>

</body>

</html>
