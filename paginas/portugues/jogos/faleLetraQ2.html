<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubra a Letra</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primaria: #6C5CE7;
            --texto: #4A4A68;
        }

        * {
            font-family: 'Baloo 2', cursive;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #D4F1FF 0%, transparent 50%),
                linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .botao-som,
        .botao-voltar {
            position: fixed;
            top: 18px;
            z-index: 500;
            border: none;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.25);
            transition: transform 0.18s ease;
        }

        .botao-som {
            right: 18px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .botao-som svg {
            width: 30px;
            height: 30px;
        }

        .botao-som.mudo {
            background: #FFE3E1;
        }

        .botao-voltar {
            left: 18px;
            height: 56px;
            padding: 0 22px 0 16px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primaria);
            font-size: 18px;
            font-weight: 700;
        }

        .botao-som:hover,
        .botao-voltar:hover {
            transform: scale(1.06);
        }

        .botao-som:active,
        .botao-voltar:active {
            transform: scale(0.92);
        }

        .botao-voltar svg {
            width: 26px;
            height: 26px;
        }

        .pim-circulo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35);
            margin-bottom: 10px;
        }

        .pim-circulo svg {
            width: 38px;
            height: 38px;
        }

        .pim-circulo.falando svg {
            animation: pula 0.45s ease-in-out infinite;
        }

        @keyframes pula {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-4px) scale(1.08);
            }
        }

        .palco {
            background: #fff;
            border-radius: 36px;
            padding: 24px 22px 28px;
            box-shadow: 0 16px 44px rgba(108, 92, 231, 0.18);
            max-width: 640px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .titulo-jogo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primaria);
        }

        .estrelas {
            display: flex;
            gap: 8px;
        }

        .estrela {
            font-size: 24px;
            filter: grayscale(1);
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .estrela.ganha {
            filter: none;
            opacity: 1;
            transform: scale(1.2);
        }

        .mensagem {
            font-size: 21px;
            font-weight: 700;
            color: var(--texto);
            min-height: 28px;
        }

        /* a letra GIGANTE que a criança deve nomear */
        .letra-grande {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 200px;
            height: 200px;
            border-radius: 36px;
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
            color: #fff;
            font-size: 130px;
            font-weight: 800;
            box-shadow: 0 12px 30px rgba(108, 92, 231, 0.35);
            transition: all 0.3s ease;
        }

        .letra-grande.certa {
            background: linear-gradient(160deg, #00B894 0%, #009975 100%);
            animation: pulinho 0.6s ease;
        }

        .letra-grande.ouvindo {
            animation: respira 1.2s ease-in-out infinite;
        }

        @keyframes respira {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 12px 30px rgba(108, 92, 231, 0.35);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 12px 40px rgba(108, 92, 231, 0.55);
            }
        }

        @keyframes pulinho {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        @media (max-width: 480px) {
            .letra-grande {
                width: 150px;
                height: 150px;
                font-size: 96px;
            }
        }

        /* botão grande do microfone */
        .botao-microfone {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(160deg, #FF7AA2 0%, #E84393 100%);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 26px rgba(232, 67, 147, 0.4);
            transition: transform 0.16s ease;
        }

        .botao-microfone svg {
            width: 46px;
            height: 46px;
        }

        .botao-microfone:hover {
            transform: scale(1.06);
        }

        .botao-microfone:active {
            transform: scale(0.92);
        }

        .botao-microfone.gravando {
            background: linear-gradient(160deg, #FF6B6B 0%, #D63031 100%);
            animation: pulsaMic 1s ease-in-out infinite;
        }

        @keyframes pulsaMic {

            0%,
            100% {
                box-shadow: 0 10px 26px rgba(214, 48, 49, 0.4);
            }

            50% {
                box-shadow: 0 10px 26px rgba(214, 48, 49, 0.4), 0 0 0 16px rgba(214, 48, 49, 0.12);
            }
        }

        .botao-microfone:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .dica-fala {
            font-size: 16px;
            font-weight: 600;
            color: #8A87A8;
            min-height: 20px;
        }

        .controles {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            border-radius: 26px;
            padding: 14px 28px;
            font-size: 19px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.16s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .btn-iniciar {
            background: linear-gradient(160deg, #00B894 0%, #009975 100%);
        }

        .btn-repetir {
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
        }

        .btn-ouvir {
            background: linear-gradient(160deg, #74B9FF 0%, #0984E3 100%);
        }

        .btn-ajuda {
            background: linear-gradient(160deg, #FDCB6E 0%, #E1A93E 100%);
            color: #6B4E00;
        }

        .festa {
            font-size: 56px;
            display: none;
        }

        .festa.aparece {
            display: block;
            animation: festa 0.8s ease infinite alternate;
        }

        @keyframes festa {
            0% {
                transform: scale(1) rotate(-6deg);
            }

            100% {
                transform: scale(1.15) rotate(6deg);
            }
        }
    </style>
</head>

<body>

    <button class="botao-voltar" id="botaoVoltar" title="Voltar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 5 L8 12 L15 19" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
        Voltar
    </button>

    <button class="botao-som" id="botaoSom" title="Ligar ou desligar a voz"></button>

    <div class="pim-circulo" id="pimCirculo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
            <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
            <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff" />
            <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
            <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
            <circle cx="40" cy="40" r="3" fill="#fff" />
            <circle cx="64" cy="40" r="3" fill="#fff" />
            <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none" />
            <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE" />
            <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
        </svg>
    </div>

    <div class="palco">

        <div class="titulo-jogo">Descubra a Letra 🎤</div>

        <div class="estrelas" id="estrelas"></div>

        <div class="mensagem" id="mensagem">Veja a letra e fale o nome dela!</div>

        <div class="letra-grande" id="letraGrande">?</div>

        <button class="botao-microfone" id="botaoMic" title="Falar" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="9" y="3" width="6" height="11" rx="3" fill="#fff" />
                <path d="M6 11 a6 6 0 0 0 12 0" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" />
                <line x1="12" y1="17" x2="12" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round" />
                <line x1="8" y1="21" x2="16" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round" />
            </svg>
        </button>

        <div class="dica-fala" id="dicaFala"></div>

        <div class="festa" id="festa">🎉🌟🎉</div>

        <div class="controles">
            <button class="btn btn-iniciar" id="btnIniciar">▶️ Começar</button>
            <button class="btn btn-ouvir" id="btnOuvir" style="display:none;">🔊 Ouvir dica</button>
            <button class="btn btn-ajuda" id="btnAjuda" style="display:none;">🙋 Ver a resposta</button>
            <button class="btn btn-repetir" id="btnRepetir" style="display:none;">🔁 Jogar de novo</button>
        </div>

    </div>

    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script>
        // ===== CREDENCIAIS (TROQUE pela sua chave!) =====
        const AZURE_KEY = "7YseDwXlpfBRO2meYxBwULsbO5mNhv4uqxdUhXtwef1jRBmcGzXeJQQJ99CFACHrzpqXJ3w3AAAYACOG87Cv";
        const AZURE_REGION = "northcentralus";
        const VOZ = "pt-BR-ThalitaNeural";
        // ================================================

        const pimCirculo = document.getElementById('pimCirculo');
        const botaoSom = document.getElementById('botaoSom');
        const botaoVoltar = document.getElementById('botaoVoltar');
        const letraGrandeEl = document.getElementById('letraGrande');
        const botaoMic = document.getElementById('botaoMic');
        const mensagem = document.getElementById('mensagem');
        const dicaFalaEl = document.getElementById('dicaFala');
        const estrelasEl = document.getElementById('estrelas');
        const festa = document.getElementById('festa');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnOuvir = document.getElementById('btnOuvir');
        const btnAjuda = document.getElementById('btnAjuda');
        const btnRepetir = document.getElementById('btnRepetir');

        let somLigado = localStorage.getItem('somLigado') !== 'false';
        let rodando = false;
        let podeResponder = false;
        let ouvindo = false;
        let tentativas = 0;

        // som "falado" de cada letra (fonética suave para o Pim falar)
        const SOM_LETRA = {
            A: 'Aaa', B: 'Bê', C: 'Cê', D: 'Dê', E: 'Eee', F: 'Éfe',
            G: 'Gê', H: 'Agá', I: 'Iii', J: 'Jota', K: 'Cá', L: 'Éle',
            M: 'Eme', N: 'Ene', O: 'Óoo', P: 'Pê', Q: 'Quê', R: 'Érre',
            S: 'Esse', T: 'Tê', U: 'Uuu', V: 'Vê', W: 'Dáblio',
            X: 'Xis', Y: 'Ípsilon', Z: 'Zê'
        };

        // ===== como o Azure costuma transcrever cada letra falada =====
        // (aceitamos várias formas para ser tolerante com a fala da criança)
        const FALA_ACEITA = {
            A: ['a', 'á', 'ah', 'ha'],
            B: ['b', 'bê', 'be', 'bé'],
            C: ['c', 'cê', 'ce', 'sê', 'se'],
            D: ['d', 'dê', 'de', 'dé'],
            E: ['e', 'é', 'eh', 'ê'],
            F: ['f', 'éfe', 'efe', 'ef'],
            G: ['g', 'gê', 'ge', 'jê', 'je'],
            H: ['h', 'agá', 'aga'],
            I: ['i', 'í', 'ih'],
            J: ['j', 'jota'],
            K: ['k', 'cá', 'ca', 'cápa', 'capa'],
            L: ['l', 'éle', 'ele', 'el'],
            M: ['m', 'eme', 'em'],
            N: ['n', 'ene', 'en'],
            O: ['o', 'ó', 'oh', 'ô'],
            P: ['p', 'pê', 'pe', 'pé'],
            Q: ['q', 'quê', 'que', 'kê', 'ke'],
            R: ['r', 'érre', 'erre', 'er'],
            S: ['s', 'esse', 'es'],
            T: ['t', 'tê', 'te', 'té'],
            U: ['u', 'ú', 'uh'],
            V: ['v', 'vê', 've', 'vé'],
            W: ['w', 'dáblio', 'dablio', 'duplo vê', 'vê vê'],
            X: ['x', 'xis', 'chis', 'shis'],
            Y: ['y', 'ípsilon', 'ipsilon', 'i grego'],
            Z: ['z', 'zê', 'ze', 'zé']
        };

        // letras usadas no jogo (foco nas mais comuns)
        const LETRAS = 'ABCDEFGHIJLMNOPRSTUV'.split('');

        const TOTAL_RODADAS = 5;
        let rodadaAtual = 0;
        let letraAlvo = '';

        const ICONE_SOM_LIGADO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#6C5CE7"/>
        <path d="M16 9 a4 4 0 0 1 0 6" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M18.5 6.5 a8 8 0 0 1 0 11" stroke="#A29BFE" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>`;
        const ICONE_SOM_MUDO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#D63031"/>
        <line x1="16" y1="9" x2="22" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="16" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
      </svg>`;

        function atualizarBotaoSom() {
            botaoSom.innerHTML = somLigado ? ICONE_SOM_LIGADO : ICONE_SOM_MUDO;
            botaoSom.classList.toggle('mudo', !somLigado);
        }
        atualizarBotaoSom();
        botaoSom.addEventListener('click', () => {
            somLigado = !somLigado;
            localStorage.setItem('somLigado', somLigado);
            atualizarBotaoSom();
        });

        function pausa(ms) { return new Promise(r => setTimeout(r, ms)); }

        function falar(texto) {
            return new Promise(resolve => {
                if (!somLigado) { resolve(); return; }
                pimCirculo.classList.add('falando');
                const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
                speechConfig.speechSynthesisVoiceName = VOZ;
                const synth = new SpeechSDK.SpeechSynthesizer(speechConfig);
                let fim = false;
                function finalizar() {
                    if (fim) return; fim = true;
                    pimCirculo.classList.remove('falando');
                    try { synth.close(); } catch (e) { }
                    resolve();
                }
                const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='-8%' pitch='+6%'>${texto}</prosody>
            </voice>
          </speak>`;
                synth.speakSsmlAsync(ssml,
                    (r) => {
                        if (r.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted)
                            setTimeout(finalizar, r.audioDuration / 10000 + 250);
                        else finalizar();
                    },
                    (e) => { console.error(e); finalizar(); }
                );
            });
        }

        function embaralhar(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function criarEstrelas() {
            estrelasEl.innerHTML = '';
            for (let i = 0; i < TOTAL_RODADAS; i++) {
                const e = document.createElement('span');
                e.className = 'estrela';
                e.textContent = '⭐';
                e.dataset.i = i;
                estrelasEl.appendChild(e);
            }
        }
        function ganharEstrela(i) {
            const e = estrelasEl.querySelector(`.estrela[data-i="${i}"]`);
            if (e) e.classList.add('ganha');
        }

        // ===== normaliza o texto reconhecido (tira acento extra, pontos, etc.) =====
        function normalizar(txt) {
            return (txt || '')
                .toLowerCase()
                .replace(/[.!?,]/g, '')
                .trim();
        }

        // ===== verifica se o que a criança falou bate com a letra-alvo =====
        function falaConfere(textoFalado, letra) {
            const t = normalizar(textoFalado);
            if (!t) return false;
            const aceitas = FALA_ACEITA[letra] || [letra.toLowerCase()];
            // confere palavra inteira OU se a fala contém a forma aceita
            for (const a of aceitas) {
                if (t === a) return true;
                if (t.split(/\s+/).includes(a)) return true;
            }
            // primeiro caractere bate com a letra (ex.: criança fala "bê de bola")
            if (t[0] === letra.toLowerCase()) return true;
            return false;
        }

        async function falarEnunciado() {
            await falar(`Que letra é essa? Aperte o microfone e fale o nome dela.`);
        }

        async function montarRodada() {
            podeResponder = false;
            tentativas = 0;
            festa.classList.remove('aparece');
            dicaFalaEl.textContent = '';
            letraGrandeEl.classList.remove('certa', 'ouvindo');
            btnAjuda.style.display = 'none';

            // sorteia a letra-alvo
            letraAlvo = LETRAS[Math.floor(Math.random() * LETRAS.length)];
            letraGrandeEl.textContent = letraAlvo;

            mensagem.textContent = 'Que letra é essa? 🎤';

            await pausa(300);
            await falarEnunciado();

            podeResponder = true;
            botaoMic.disabled = false;
        }

        // ===== RECONHECIMENTO DE FALA (Azure Speech-to-Text) =====
        function ouvirCrianca() {
            return new Promise((resolve) => {
                const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
                speechConfig.speechRecognitionLanguage = 'pt-BR';
                const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
                const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

                recognizer.recognizeOnceAsync(
                    (result) => {
                        let texto = '';
                        if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                            texto = result.text;
                        }
                        try { recognizer.close(); } catch (e) { }
                        resolve(texto);
                    },
                    (err) => {
                        console.error(err);
                        try { recognizer.close(); } catch (e) { }
                        resolve('');
                    }
                );
            });
        }

        async function aoFalar() {
            if (!podeResponder || ouvindo) return;
            ouvindo = true;
            podeResponder = false;
            botaoMic.classList.add('gravando');
            letraGrandeEl.classList.add('ouvindo');
            mensagem.textContent = 'Estou ouvindo... 👂';
            dicaFalaEl.textContent = 'Fale a letra!';

            const texto = await ouvirCrianca();

            botaoMic.classList.remove('gravando');
            letraGrandeEl.classList.remove('ouvindo');
            ouvindo = false;

            if (falaConfere(texto, letraAlvo)) {
                await acertou();
            } else {
                tentativas++;
                if (texto) dicaFalaEl.textContent = `Você falou: "${texto}"`;
                else dicaFalaEl.textContent = 'Não consegui ouvir bem 🙂';

                if (tentativas >= 2) {
                    // após 2 tentativas, dá uma dica forte e libera "ver resposta"
                    mensagem.textContent = 'Vou te dar uma dica! 💜';
                    await falar(`Essa letra é a letra ${SOM_LETRA[letraAlvo]}. Tente falar ${SOM_LETRA[letraAlvo]}.`);
                    btnAjuda.style.display = 'flex';
                } else {
                    mensagem.textContent = 'Quase! Tente de novo 💜';
                    await falar('Quase! Aperte o microfone e tente de novo.');
                }
                podeResponder = true;
                botaoMic.disabled = false;
            }
        }

        async function acertou() {
            letraGrandeEl.classList.add('certa');
            ganharEstrela(rodadaAtual);
            mensagem.textContent = `Isso! Essa é a letra ${letraAlvo}! 🎉`;
            dicaFalaEl.textContent = '';
            await falar(`Muito bem! Essa é a letra ${SOM_LETRA[letraAlvo]}!`);
            await pausa(500);
            rodadaAtual++;
            if (rodadaAtual >= TOTAL_RODADAS) terminarJogo();
            else { botaoMic.disabled = true; montarRodada(); }
        }

        // botão de acolhimento: mostra/conta a resposta sem punir
        async function verResposta() {
            if (ouvindo) return;
            podeResponder = false;
            botaoMic.disabled = true;
            btnAjuda.style.display = 'none';
            letraGrandeEl.classList.add('certa');
            ganharEstrela(rodadaAtual);
            mensagem.textContent = `Essa é a letra ${letraAlvo}! 💜`;
            await falar(`Sem problemas! Essa é a letra ${SOM_LETRA[letraAlvo]}. Você está indo muito bem!`);
            await pausa(500);
            rodadaAtual++;
            if (rodadaAtual >= TOTAL_RODADAS) terminarJogo();
            else montarRodada();
        }

        async function terminarJogo() {
            rodando = false;
            mensagem.textContent = 'Você descobriu todas as letras! Parabéns! 🎉';
            letraGrandeEl.textContent = '🏆';
            letraGrandeEl.classList.remove('certa');
            botaoMic.style.display = 'none';
            dicaFalaEl.textContent = '';
            festa.classList.add('aparece');
            await falar('Parabéns! Você falou todas as letras certinho! Você é incrível!');
            localStorage.setItem('jogo_descubraaletra_concluido', 'true');
            btnOuvir.style.display = 'none';
            btnAjuda.style.display = 'none';
            btnRepetir.style.display = 'flex';
            btnIniciar.disabled = false;
        }

        async function jogar() {
            rodando = true;
            rodadaAtual = 0;
            letraGrandeEl.textContent = '?';
            letraGrandeEl.classList.remove('certa');
            btnIniciar.disabled = true;
            btnRepetir.style.display = 'none';
            btnOuvir.style.display = 'flex';
            botaoMic.style.display = 'flex';
            botaoMic.disabled = true;
            criarEstrelas();
            await falar('Vamos descobrir as letras! Eu mostro uma letra e você fala o nome dela no microfone.');
            montarRodada();
        }

        btnIniciar.addEventListener('click', () => { if (!rodando) jogar(); });
        btnRepetir.addEventListener('click', () => jogar());
        btnOuvir.addEventListener('click', () => { if (rodando) falarEnunciado(); });
        btnAjuda.addEventListener('click', verResposta);
        botaoMic.addEventListener('click', aoFalar);

        botaoVoltar.addEventListener('click', () => {
            rodando = false;
            window.location.href = '../paginaportugues.html';
        });

        // estado inicial
        criarEstrelas();
    </script>

</body>

</html>
