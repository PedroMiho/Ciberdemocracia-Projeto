<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha uma Matéria!</title>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primaria: #6C5CE7; --texto: #4A4A68;
      --escrita: #FF7675; --matematica: #6C5CE7;
      --leitura: #00B894; --ortografia: #FDCB6E;
    }
    * { font-family: 'Baloo 2', cursive; box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #D4F1FF 0%, transparent 50%),
        linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
      min-height: 100vh; padding: 30px 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* Tela inicial "Toque para começar" */
    .tela-inicio {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      cursor: pointer;
    }
    .tela-inicio.escondida { display: none; }
    .tela-inicio .pim-grande {
      width: 140px; height: 140px; border-radius: 50%;
      background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 30px rgba(108,92,231,0.4);
      animation: flutua 3s ease-in-out infinite;
    }
    .tela-inicio .pim-grande svg { width: 90px; height: 90px; }
    .tela-inicio .texto-toque {
      font-size: 28px; font-weight: 700; color: #6C5CE7;
      animation: pisca 1.4s ease-in-out infinite;
    }
    @keyframes pisca { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

    /* Cabeçalho com o Pim */
    .topo {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; max-width: 900px; margin-bottom: 36px; flex-wrap: wrap;
    }
    .pim-circulo {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(108,92,231,0.35); flex-shrink: 0;
    }
    .pim-circulo svg { width: 52px; height: 52px; animation: flutua 3.5s ease-in-out infinite; }
    .pim-circulo.falando svg { animation: pula 0.45s ease-in-out infinite; }
    @keyframes flutua { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
    @keyframes pula { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-4px) scale(1.08);} }

    .titulo { color: var(--texto); font-size: 32px; font-weight: 800; }
    .subtitulo { color: #8A87A8; font-size: 20px; font-weight: 600; }

    /* Grade de cards */
    .grade {
      max-width: 900px; width: 100%;
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
    }
    @media (max-width: 600px) { .grade { grid-template-columns: 1fr; } }

    .card-materia {
      background: #fff; border-radius: 32px; padding: 32px 24px;
      text-align: center; cursor: pointer; border: none;
      box-shadow: 0 14px 36px rgba(108,92,231,0.15);
      transition: transform 0.18s ease, box-shadow 0.18s ease, outline 0.2s ease;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      position: relative;
    }
    .card-materia:hover { transform: translateY(-6px); box-shadow: 0 20px 44px rgba(108,92,231,0.25); }
    .card-materia:active { transform: translateY(-2px) scale(0.98); }

    /* Card destacado enquanto a seta aponta para ele */
    .card-materia.destaque {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 22px 48px rgba(108,92,231,0.35);
      outline: 4px solid #FDCB6E;
      outline-offset: 4px;
    }

    .icone-circulo {
      width: 120px; height: 120px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icone-circulo svg { width: 64px; height: 64px; }

    .nome-materia { font-size: 28px; font-weight: 700; color: var(--texto); }

    /* Cores por matéria */
    .escrita .icone-circulo    { background: #FFE3E1; }
    .matematica .icone-circulo { background: #E8E4FF; }
    .leitura .icone-circulo    { background: #D4F5EC; }
    .ortografia .icone-circulo { background: #FFF4D6; }

    .escrita    { border-bottom: 8px solid var(--escrita); }
    .matematica { border-bottom: 8px solid var(--matematica); }
    .leitura    { border-bottom: 8px solid var(--leitura); }
    .ortografia { border-bottom: 8px solid var(--ortografia); }

    /* 👉 Seta indicadora que aponta para cada card */
    .seta-pim {
      position: absolute;
      font-size: 56px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.5);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
      filter: drop-shadow(0 4px 8px rgba(108,92,231,0.4));
    }
    .seta-pim.ativa {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      animation: setaPula 0.7s ease-in-out infinite;
    }
    @keyframes setaPula {
      0%, 100% { margin-left: 0; }
      50%      { margin-left: 14px; }
    }
  </style>
</head>
<body>

  <!-- Tela "Toque para começar" -->
  <div class="tela-inicio" id="telaInicio">
    <div class="pim-grande">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <circle cx="50" cy="5" r="5" fill="#FDCB6E"/>
        <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff"/>
        <circle cx="38" cy="42" r="8" fill="#6C5CE7"/><circle cx="62" cy="42" r="8" fill="#6C5CE7"/>
        <circle cx="40" cy="40" r="3" fill="#fff"/><circle cx="64" cy="40" r="3" fill="#fff"/>
        <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none"/>
        <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE"/>
        <circle cx="50" cy="79" r="4" fill="#FDCB6E"/>
      </svg>
    </div>
    <div class="texto-toque">👆 Toque para começar!</div>
  </div>

  <!-- Seta que o Pim usa para apontar -->
  <div class="seta-pim" id="setaPim">👉</div>

  <!-- CABEÇALHO -->
  <div class="topo">
    <div class="pim-circulo" id="pimCirculo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
        <circle cx="50" cy="5" r="5" fill="#FDCB6E"/>
        <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff"/>
        <circle cx="38" cy="42" r="8" fill="#6C5CE7"/><circle cx="62" cy="42" r="8" fill="#6C5CE7"/>
        <circle cx="40" cy="40" r="3" fill="#fff"/><circle cx="64" cy="40" r="3" fill="#fff"/>
        <circle cx="28" cy="54" r="5" fill="#FFB8C4" opacity="0.7"/>
        <circle cx="72" cy="54" r="5" fill="#FFB8C4" opacity="0.7"/>
        <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none"/>
        <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE"/>
        <circle cx="50" cy="79" r="4" fill="#FDCB6E"/>
      </svg>
    </div>
    <div>
      <div class="titulo" id="saudacao">O que vamos aprender hoje?</div>
      <div class="subtitulo">Escolha uma matéria 👇</div>
    </div>
  </div>

  <!-- GRADE DE MATÉRIAS -->
  <div class="grade">

    <button class="card-materia escrita" data-materia="escrita" data-nome="Letras">
      <div class="icone-circulo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 44 L40 18 L48 26 L22 52 L12 54 Z" fill="#FF7675"/>
          <path d="M40 18 L46 12 L54 20 L48 26 Z" fill="#D63031"/>
          <line x1="14" y1="58" x2="50" y2="58" stroke="#FF7675" stroke-width="4" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nome-materia">Letras</div>
    </button>

    <button class="card-materia matematica" data-materia="matematica" data-nome="Matemática">
      <div class="icone-circulo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="14" y1="20" x2="30" y2="20" stroke="#6C5CE7" stroke-width="5" stroke-linecap="round"/>
          <line x1="22" y1="12" x2="22" y2="28" stroke="#6C5CE7" stroke-width="5" stroke-linecap="round"/>
          <line x1="36" y1="44" x2="52" y2="44" stroke="#6C5CE7" stroke-width="5" stroke-linecap="round"/>
          <circle cx="44" cy="20" r="4" fill="#A29BFE"/><circle cx="22" cy="44" r="4" fill="#A29BFE"/>
          <line x1="50" y1="14" x2="38" y2="28" stroke="#A29BFE" stroke-width="5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nome-materia">Matemática</div>
    </button>

    <button class="card-materia leitura" data-materia="leitura" data-nome="Leitura">
      <div class="icone-circulo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 18 C26 14 16 14 10 16 L10 48 C16 46 26 46 32 50 Z" fill="#00B894"/>
          <path d="M32 18 C38 14 48 14 54 16 L54 48 C48 46 38 46 32 50 Z" fill="#55EFC4"/>
          <line x1="32" y1="18" x2="32" y2="50" stroke="#009975" stroke-width="3"/>
        </svg>
      </div>
      <div class="nome-materia">Leitura</div>
    </button>

    <button class="card-materia ortografia" data-materia="ortografia" data-nome="Escrita">
      <div class="icone-circulo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="14" y="34" font-family="Baloo 2" font-size="26" font-weight="800" fill="#F0A500">A</text>
          <text x="34" y="34" font-family="Baloo 2" font-size="26" font-weight="800" fill="#FDCB6E">a</text>
          <path d="M18 44 L20 48 L26 40" stroke="#00B894" stroke-width="4" stroke-linecap="round" fill="none"/>
          <circle cx="46" cy="46" r="9" fill="none" stroke="#F0A500" stroke-width="4"/>
        </svg>
      </div>
      <div class="nome-materia">Escrita</div>
    </button>

  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script>
    // ===== CREDENCIAIS (TROQUE por sua chave NOVA!) =====
    const AZURE_KEY    = "7YseDwXlpfBRO2meYxBwULsbO5mNhv4uqxdUhXtwef1jRBmcGzXeJQQJ99CFACHrzpqXJ3w3AAAYACOG87Cv";
    const AZURE_REGION = "northcentralus";
    const VOZ = "pt-BR-ThalitaNeural";
    // ====================================================

    const pimCirculo = document.getElementById('pimCirculo');
    const setaPim    = document.getElementById('setaPim');
    const telaInicio = document.getElementById('telaInicio');
    const nome       = localStorage.getItem('nomeAluno');

    if (nome) {
      document.getElementById('saudacao').textContent = `O que vamos aprender, ${nome}?`;
    }

    // Pausa em milissegundos
    function pausa(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Fala simples (texto comum)
    function falar(texto) {
      return new Promise(resolve => {
        pimCirculo.classList.add('falando');
        const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
        const synthesizer  = new SpeechSDK.SpeechSynthesizer(speechConfig);
        const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='0%' pitch='+6%'>${texto}</prosody>
            </voice>
          </speak>`;
        synthesizer.speakSsmlAsync(
          ssml,
          () => { synthesizer.close(); pimCirculo.classList.remove('falando'); resolve(); },
          () => { synthesizer.close(); pimCirculo.classList.remove('falando'); resolve(); }
        );
      });
    }

    // Fala com tags SSML (pausas internas)
    function falarComPausas(textoSsml) {
      return new Promise(resolve => {
        pimCirculo.classList.add('falando');
        const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
        const synthesizer  = new SpeechSDK.SpeechSynthesizer(speechConfig);
        const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='-5%' pitch='+6%'>${textoSsml}</prosody>
            </voice>
          </speak>`;
        synthesizer.speakSsmlAsync(
          ssml,
          () => { synthesizer.close(); pimCirculo.classList.remove('falando'); resolve(); },
          () => { synthesizer.close(); pimCirculo.classList.remove('falando'); resolve(); }
        );
      });
    }

    // 👉 Posiciona a seta à esquerda de um card e o destaca
    function apontarPara(materia) {
      const card = document.querySelector(`.card-materia[data-materia="${materia}"]`);
      if (!card) return;

      const r = card.getBoundingClientRect();
      setaPim.style.left = (r.left + window.scrollX - 30) + 'px';
      setaPim.style.top  = (r.top + window.scrollY + r.height / 2) + 'px';

      document.querySelectorAll('.card-materia').forEach(c => c.classList.remove('destaque'));
      card.classList.add('destaque');
      setaPim.classList.add('ativa');
    }

    // Esconde a seta e tira os destaques
    function esconderSeta() {
      setaPim.classList.remove('ativa');
      document.querySelectorAll('.card-materia').forEach(c => c.classList.remove('destaque'));
    }

    // 🎙️ Apresentação completa: fala cada matéria APONTANDO para o card
    async function iniciarApresentacao() {
      if (nome) {
        await falar(`Olá, ${nome}!`);
      } else {
        await falar('Olá!');
      }
      await pausa(500);

      await falar('Hoje nós vamos estudar muito, primeiro vamos escolher uma materia!');
      await pausa(2500);

      apontarPara('escrita');
      await falar('Se quiser estudar as LETRAS clique aqui.');
      await pausa(2000);

      apontarPara('matematica');
      await falar('Para estudar MATEMATICA clique aqui.');
      await pausa(2000);

      apontarPara('leitura');
      await falar('Para estudar a LEITURA clique aqui.');
      await pausa(1500);

      apontarPara('ortografia');
      await falar('Para estudar a ESCRITA clique aqui.');
      await pausa(2000);

      esconderSeta();
      await falar('Agora escolha uma matéria para começarmos!');
    }

    // 👆 O toque libera o áudio e inicia a apresentação
    telaInicio.addEventListener('click', () => {
      telaInicio.classList.add('escondida'); // some a tela
      iniciarApresentacao();                 // começa a falar
    }, { once: true });

    // Mantém a seta alinhada se a tela for redimensionada/girada
    window.addEventListener('resize', () => {
      const cardDestacado = document.querySelector('.card-materia.destaque');
      if (cardDestacado) {
        apontarPara(cardDestacado.dataset.materia);
      }
    });

    // Clique nos cards → Pim comenta e segue
    document.querySelectorAll('.card-materia').forEach(card => {
      card.addEventListener('click', async () => {
        const materia     = card.dataset.materia;
        const nomeMateria = card.dataset.nome;
        localStorage.setItem('materiaEscolhida', materia);

        esconderSeta(); // some com a seta ao escolher

        await falar(`Você escolheu ${nomeMateria}! Vamos lá!`);

        // 👉 Descomente quando criar as páginas das matérias:
        // window.location.href = materia + '.html';
        console.log('Matéria escolhida:', materia);
      });
    });
  </script>

</body>
</html>
