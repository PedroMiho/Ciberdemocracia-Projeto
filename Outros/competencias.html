<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha uma Matéria!</title>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primaria: #6C5CE7;
      --texto: #4A4A68;
      --portugues: #FF7675;
      --matematica: #6C5CE7;
    }

    * {
      font-family: 'Baloo 2', cursive;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #D4F1FF 0%, transparent 50%),
        linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Tela inicial "Toque para começar" */
    .tela-inicio {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      cursor: pointer;
    }

    .tela-inicio.escondida {
      display: none;
    }

    .tela-inicio .pim-grande {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(108, 92, 231, 0.4);
      animation: flutua 3s ease-in-out infinite;
    }

    .tela-inicio .pim-grande svg {
      width: 78px;
      height: 78px;
    }

    .tela-inicio .texto-toque {
      font-size: 26px;
      font-weight: 700;
      color: #6C5CE7;
      animation: pisca 1.4s ease-in-out infinite;
    }

    @keyframes pisca {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    /* 🔇 Botão de som (canto superior) */
    .botao-som {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 500;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(108, 92, 231, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .botao-som:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 24px rgba(108, 92, 231, 0.35);
    }

    .botao-som:active {
      transform: scale(0.92);
    }

    .botao-som svg {
      width: 30px;
      height: 30px;
    }

    .botao-som.mudo {
      background: #FFE3E1;
    }

    /* Cabeçalho com o Pim */
    .topo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      max-width: 640px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .pim-circulo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35);
      flex-shrink: 0;
    }

    .pim-circulo svg {
      width: 42px;
      height: 42px;
      animation: flutua 3.5s ease-in-out infinite;
    }

    .pim-circulo.falando svg {
      animation: pula 0.45s ease-in-out infinite;
    }

    @keyframes flutua {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes pula {

      0%,
      100% {
        transform: translateY(0) scale(1);
      }

      50% {
        transform: translateY(-4px) scale(1.08);
      }
    }

    .titulo {
      color: var(--texto);
      font-size: 26px;
      font-weight: 800;
    }

    .subtitulo {
      color: #8A87A8;
      font-size: 17px;
      font-weight: 600;
    }

    /* Grade de cards (2 matérias) */
    .grade {
      max-width: 600px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    @media (max-width: 560px) {
      .grade {
        grid-template-columns: 1fr;
      }
    }

    .card-materia {
      background: #fff;
      border-radius: 26px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      border: none;
      box-shadow: 0 12px 30px rgba(108, 92, 231, 0.15);
      transition: transform 0.18s ease, box-shadow 0.18s ease, outline 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .card-materia:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 40px rgba(108, 92, 231, 0.25);
    }

    .card-materia:active {
      transform: translateY(-2px) scale(0.98);
    }

    .card-materia.destaque {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 20px 44px rgba(108, 92, 231, 0.35);
      outline: 4px solid #FDCB6E;
      outline-offset: 4px;
    }

    .icone-circulo {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icone-circulo svg {
      width: 46px;
      height: 46px;
    }

    .nome-materia {
      font-size: 22px;
      font-weight: 700;
      color: var(--texto);
    }

    .portugues .icone-circulo {
      background: #FFE3E1;
    }

    .matematica .icone-circulo {
      background: #E8E4FF;
    }

    .portugues {
      border-bottom: 6px solid var(--portugues);
    }

    .matematica {
      border-bottom: 6px solid var(--matematica);
    }

    /* 👉 Seta indicadora */
    .seta-pim {
      position: absolute;
      font-size: 46px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.5);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 50;
      filter: drop-shadow(0 4px 8px rgba(108, 92, 231, 0.4));
    }

    .seta-pim.ativa {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      animation: setaPula 0.7s ease-in-out infinite;
    }

    @keyframes setaPula {

      0%,
      100% {
        margin-left: 0;
      }

      50% {
        margin-left: 12px;
      }
    }

    /* 🎤 Área do microfone */
    .area-microfone {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .botao-mic {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(160deg, #00B894 0%, #009975 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(0, 184, 148, 0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .botao-mic:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0, 184, 148, 0.5);
    }

    .botao-mic:active {
      transform: scale(0.94);
    }

    .botao-mic svg {
      width: 36px;
      height: 36px;
    }

    .botao-mic.ouvindo {
      background: linear-gradient(160deg, #FF7675 0%, #D63031 100%);
      animation: pulsaMic 1s ease-in-out infinite;
    }

    @keyframes pulsaMic {

      0%,
      100% {
        box-shadow: 0 8px 22px rgba(255, 118, 117, 0.5), 0 0 0 0 rgba(255, 118, 117, 0.5);
      }

      50% {
        box-shadow: 0 8px 22px rgba(255, 118, 117, 0.5), 0 0 0 14px rgba(255, 118, 117, 0);
      }
    }

    .texto-mic {
      font-size: 18px;
      font-weight: 700;
      color: var(--texto);
    }

    .texto-mic-ajuda {
      font-size: 14px;
      font-weight: 600;
      color: #8A87A8;
    }
  </style>
</head>

<body>

  <!-- 🔇 Botão Ligar/Desligar som -->
  <button class="botao-som" id="botaoSom" title="Ligar ou desligar a voz"></button>

  <!-- Tela "Toque para começar" -->
  <div class="tela-inicio" id="telaInicio">
    <div class="pim-grande">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
        <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
        <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff" />
        <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
        <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
        <circle cx="40" cy="40" r="3" fill="#fff" />
        <circle cx="64" cy="40" r="3" fill="#fff" />
        <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none" />
        <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE" />
        <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
      </svg>
    </div>
    <div class="texto-toque">👆 Toque para começar!</div>
  </div>

  <!-- Seta -->
  <div class="seta-pim" id="setaPim">👉</div>

  <!-- CABEÇALHO -->
  <div class="topo">
    <div class="pim-circulo" id="pimCirculo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
        <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
        <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff" />
        <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
        <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
        <circle cx="40" cy="40" r="3" fill="#fff" />
        <circle cx="64" cy="40" r="3" fill="#fff" />
        <circle cx="28" cy="54" r="5" fill="#FFB8C4" opacity="0.7" />
        <circle cx="72" cy="54" r="5" fill="#FFB8C4" opacity="0.7" />
        <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none" />
        <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE" />
        <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
      </svg>
    </div>
    <div>
      <div class="titulo" id="saudacao">O que vamos aprender hoje?</div>
      <div class="subtitulo">Escolha uma matéria 👇</div>
    </div>
  </div>

  <!-- GRADE DE MATÉRIAS -->
  <div class="grade">

    <button class="card-materia portugues" data-materia="portugues" data-nome="Português">
      <div class="icone-circulo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 44 L40 18 L48 26 L22 52 L12 54 Z" fill="#FF7675" />
          <path d="M40 18 L46 12 L54 20 L48 26 Z" fill="#D63031" />
          <line x1="14" y1="58" x2="50" y2="58" stroke="#FF7675" stroke-width="4" stroke-linecap="round" />
        </svg>
      </div>
      <div class="nome-materia">Português</div>
    </button>

    <button class="card-materia matematica" data-materia="matematica" data-nome="Matemática">
      <div class="icone-circulo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="14" y1="20" x2="30" y2="20" stroke="#6C5CE7" stroke-width="5" stroke-linecap="round" />
          <line x1="22" y1="12" x2="22" y2="28" stroke="#6C5CE7" stroke-width="5" stroke-linecap="round" />
          <line x1="36" y1="44" x2="52" y2="44" stroke="#6C5CE7" stroke-width="5" stroke-linecap="round" />
          <circle cx="44" cy="20" r="4" fill="#A29BFE" />
          <circle cx="22" cy="44" r="4" fill="#A29BFE" />
          <line x1="50" y1="14" x2="38" y2="28" stroke="#A29BFE" stroke-width="5" stroke-linecap="round" />
        </svg>
      </div>
      <div class="nome-materia">Matemática</div>
    </button>

  </div>

  <!-- 🎤 BOTÃO DE MICROFONE -->
  <div class="area-microfone">
    <button class="botao-mic" id="botaoMic" title="Fale a matéria">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="2" width="6" height="12" rx="3" fill="#fff" />
        <path d="M5 11 a7 7 0 0 0 14 0" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" />
        <line x1="12" y1="18" x2="12" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round" />
        <line x1="8" y1="22" x2="16" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
    <div class="texto-mic" id="textoMic">🎤 Fale a matéria</div>
    <div class="texto-mic-ajuda">Diga "Português" ou "Matemática"</div>
  </div>

  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script>
    // ===== CREDENCIAIS (TROQUE por sua chave NOVA!) =====
    const AZURE_KEY = "7YseDwXlpfBRO2meYxBwULsbO5mNhv4uqxdUhXtwef1jRBmcGzXeJQQJ99CFACHrzpqXJ3w3AAAYACOG87Cv";
    const AZURE_REGION = "northcentralus";
    const VOZ = "pt-BR-ThalitaNeural";
    // ====================================================

    const pimCirculo = document.getElementById('pimCirculo');
    const setaPim = document.getElementById('setaPim');
    const telaInicio = document.getElementById('telaInicio');
    const botaoMic = document.getElementById('botaoMic');
    const textoMic = document.getElementById('textoMic');
    const botaoSom = document.getElementById('botaoSom');
    const nome = localStorage.getItem('nomeAluno');

    // 🔒 TRAVAS
    let ouvindo = false;
    let navegando = false;

    // 🔇 Estado do som (salvo no navegador). Padrão: ligado
    let somLigado = localStorage.getItem('somLigado') !== 'false';

    const ICONE_SOM_LIGADO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#6C5CE7"/>
        <path d="M16 9 a4 4 0 0 1 0 6" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M18.5 6.5 a8 8 0 0 1 0 11" stroke="#A29BFE" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>`;

    const ICONE_SOM_MUDO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#D63031"/>
        <line x1="16" y1="9" x2="22" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="16" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
      </svg>`;

    function atualizarBotaoSom() {
      botaoSom.innerHTML = somLigado ? ICONE_SOM_LIGADO : ICONE_SOM_MUDO;
      botaoSom.classList.toggle('mudo', !somLigado);
      botaoSom.title = somLigado ? 'Desligar a voz' : 'Ligar a voz';
    }
    atualizarBotaoSom();

    botaoSom.addEventListener('click', () => {
      somLigado = !somLigado;
      localStorage.setItem('somLigado', somLigado);
      atualizarBotaoSom();
    });

    if (nome) {
      document.getElementById('saudacao').textContent = `O que vamos aprender, ${nome}?`;
    }

    function pausa(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ✅ FALA QUE AGUARDA O ÁUDIO TERMINAR DE TOCAR (respeita modo silencioso)
    function falar(texto) {
      return new Promise(resolve => {

        // 🔇 modo silencioso: não fala, resolve na hora
        if (!somLigado) {
          resolve();
          return;
        }

        pimCirculo.classList.add('falando');

        const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
        speechConfig.speechSynthesisVoiceName = VOZ;

        const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig);

        let finalizado = false;
        function finalizar() {
          if (finalizado) return;
          finalizado = true;
          pimCirculo.classList.remove('falando');
          try { synthesizer.close(); } catch (e) {}
          resolve();
        }

        const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='0%' pitch='+6%'>${texto}</prosody>
            </voice>
          </speak>`;

        synthesizer.speakSsmlAsync(
          ssml,
          (result) => {
            if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) {
              const duracaoMs = result.audioDuration / 10000;
              console.log('🔊 Duração do áudio:', Math.round(duracaoMs), 'ms');
              setTimeout(finalizar, duracaoMs + 300);
            } else {
              console.warn('Áudio não completou:', result.reason);
              finalizar();
            }
          },
          (err) => { console.error('Erro na fala:', err); finalizar(); }
        );
      });
    }

    function apontarPara(materia) {
      const card = document.querySelector(`.card-materia[data-materia="${materia}"]`);
      if (!card) return;
      const r = card.getBoundingClientRect();
      setaPim.style.left = (r.left + window.scrollX - 26) + 'px';
      setaPim.style.top = (r.top + window.scrollY + r.height / 2) + 'px';
      document.querySelectorAll('.card-materia').forEach(c => c.classList.remove('destaque'));
      card.classList.add('destaque');
      setaPim.classList.add('ativa');
    }

    function esconderSeta() {
      setaPim.classList.remove('ativa');
      document.querySelectorAll('.card-materia').forEach(c => c.classList.remove('destaque'));
    }

    async function iniciarApresentacao() {
      if (nome) { await falar(`Olá, ${nome}!`); } else { await falar('Olá!'); }
      await pausa(400);
      await falar('Hoje nós vamos estudar muito! Primeiro vamos escolher uma matéria.');
      await pausa(500);

      apontarPara('portugues');
      await falar('Para estudar PORTUGUÊS, clique aqui.');
      await pausa(500);

      apontarPara('matematica');
      await falar('Para estudar MATEMÁTICA, clique aqui.');
      await pausa(500);

      esconderSeta();
      await falar('Você também pode tocar no microfone e falar o nome da matéria!');
    }

    telaInicio.addEventListener('click', () => {
      telaInicio.classList.add('escondida');
      iniciarApresentacao();
    }, { once: true });

    window.addEventListener('resize', () => {
      const cardDestacado = document.querySelector('.card-materia.destaque');
      if (cardDestacado) apontarPara(cardDestacado.dataset.materia);
    });

    // ✅ Aguarda a fala TERMINAR antes de ir para a página
    async function irParaMateria(materia, nomeMateria) {
      if (navegando) return;
      navegando = true;

      localStorage.setItem('materiaEscolhida', materia);
      esconderSeta();

      await falar(`Você escolheu ${nomeMateria}! Vamos lá!`);
      await pausa(600);

      window.location.href = `${materia}/pagina${materia}.html`;
    }

    document.querySelectorAll('.card-materia').forEach(card => {
      card.addEventListener('click', () => {
        irParaMateria(card.dataset.materia, card.dataset.nome);
      });
    });

    // ===== 🎤 RECONHECIMENTO DE VOZ =====
    function interpretarFala(textoFalado) {
      const t = textoFalado.toLowerCase();
      if (t.includes('portug') || t.includes('letra') || t.includes('porto') || t.includes('escrita')) {
        return { materia: 'portugues', nome: 'Português' };
      }
      if (t.includes('matem') || t.includes('mate') || t.includes('número') || t.includes('numero') ||
        t.includes('conta') || t.includes('soma')) {
        return { materia: 'matematica', nome: 'Matemática' };
      }
      return null;
    }

    botaoMic.addEventListener('click', async () => {
      if (ouvindo || navegando) return;
      ouvindo = true;
      botaoMic.classList.add('ouvindo');
      textoMic.textContent = '👂 Estou ouvindo...';

      const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
      speechConfig.speechRecognitionLanguage = 'pt-BR';
      const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
      const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

      recognizer.recognizeOnceAsync(async (result) => {
        recognizer.close();
        botaoMic.classList.remove('ouvindo');
        ouvindo = false;

        if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech && result.text) {
          const escolha = interpretarFala(result.text);
          if (escolha) {
            textoMic.textContent = `✅ ${escolha.nome}!`;
            apontarPara(escolha.materia);
            await irParaMateria(escolha.materia, escolha.nome);
          } else {
            textoMic.textContent = '🎤 Fale a matéria';
            await falar('Não entendi. Diga Português ou Matemática, ou toque na matéria.');
          }
        } else {
          textoMic.textContent = '🎤 Fale a matéria';
          await falar('Não escutei nada. Toque no microfone e fale a matéria.');
        }
      }, (err) => {
        recognizer.close();
        botaoMic.classList.remove('ouvindo');
        ouvindo = false;
        textoMic.textContent = '🎤 Fale a matéria';
        console.error('Erro no microfone:', err);
      });
    });
  </script>

</body>
