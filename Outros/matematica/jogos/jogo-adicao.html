<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Some as Balas!</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primaria: #6C5CE7;
            --texto: #4A4A68;
            --verde: #55D6A0;
        }

        * {
            font-family: 'Baloo 2', cursive;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #FFE9CC 0%, transparent 50%),
                linear-gradient(160deg, #FFF7F0 0%, #F5F3FF 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            border-radius: 36px;
            padding: 36px 28px;
            width: 100%;
            max-width: 820px;
            box-shadow: 0 20px 50px rgba(108, 92, 231, .18);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grupo,
        .prato {
            border-radius: 24px;
            padding: 14px;
            width: 170px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .grupo {
            background: #F5F3FF;
        }

        .prato {
            background: #FCFBFF;
            border: 4px dashed #C7BFFF;
        }

        .grupo .bala,
        .prato .bala {
            font-size: 30px;
            line-height: 1;
            flex: 0 0 44px;
            width: 44px;
            text-align: center;
        }

        .prato .bala {
            animation: cai .35s ease;
        }

        .botao-som,
        .botao-voltar {
            position: fixed;
            top: 18px;
            z-index: 500;
            border: none;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(108, 92, 231, .25);
            transition: transform .18s ease;
        }

        .botao-som {
            right: 18px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .botao-som svg {
            width: 30px;
            height: 30px;
        }

        .botao-som.mudo {
            background: #FFE3E1;
        }

        .botao-voltar {
            left: 18px;
            height: 56px;
            padding: 0 22px 0 16px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primaria);
            font-size: 18px;
            font-weight: 700;
        }

        .botao-voltar svg {
            width: 26px;
            height: 26px;
        }

        .botao-som:hover,
        .botao-voltar:hover {
            transform: scale(1.06);
        }

        .botao-som:active,
        .botao-voltar:active {
            transform: scale(.93);
        }

        .topo {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
        }

        .pim-circulo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(108, 92, 231, .35);
            flex-shrink: 0;
        }

        .pim-circulo svg {
            width: 42px;
            height: 42px;
            animation: flutua 3.5s ease-in-out infinite;
        }

        .pim-circulo.falando svg {
            animation: pula .45s ease-in-out infinite;
        }

        @keyframes flutua {
            0%, 100% { transform: translateY(0) }
            50% { transform: translateY(-6px) }
        }

        @keyframes pula {
            0%, 100% { transform: translateY(0) scale(1) }
            50% { transform: translateY(-4px) scale(1.08) }
        }

        .titulo {
            color: var(--texto);
            font-size: 24px;
            font-weight: 800;
        }

        .conta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin: 10px 0 4px;
        }

        .operador {
            font-size: 48px;
            font-weight: 800;
            color: #FF7675;
        }

        .igual {
            font-size: 48px;
            font-weight: 800;
            color: var(--primaria);
        }

        .prato.certo {
            border-color: var(--verde);
            background: #EAFBF3;
        }

        @keyframes cai {
            0% { transform: translateY(-20px) scale(.4); opacity: 0 }
            100% { transform: translateY(0) scale(1); opacity: 1 }
        }

        .placar {
            color: #8A87A8;
            font-size: 20px;
            font-weight: 700;
            margin: 14px 0 6px;
        }

        /* ===== NOVO: TECLADO NUMÉRICO ===== */
        .teclado {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
            max-width: 560px;
        }

        .btn-num {
            width: 70px;
            height: 70px;
            border-radius: 22px;
            border: none;
            font-size: 34px;
            font-weight: 800;
            color: var(--primaria);
            background: #F5F3FF;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(108, 92, 231, .15);
            transition: transform .15s ease, background .15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-num:hover {
            transform: scale(1.08);
        }

        .btn-num:active {
            transform: scale(.9);
        }

        .btn-num.selecionado {
            background: linear-gradient(160deg, #A29BFE, #6C5CE7);
            color: #fff;
            transform: scale(1.05);
        }

        .btn-acao {
            padding: 16px 40px;
            border-radius: 30px;
            border: none;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(160deg, #A29BFE, #6C5CE7);
            box-shadow: 0 10px 26px rgba(108, 92, 231, .35);
            transition: transform .15s ease;
            margin-top: 8px;
        }

        .btn-acao:hover {
            transform: scale(1.05);
        }

        .btn-acao:active {
            transform: scale(.95);
        }

        .festa {
            font-size: 60px;
            margin-top: 10px;
            min-height: 70px;
        }

        .festa.show {
            animation: pop .5s ease;
        }

        @keyframes pop {
            0% { transform: scale(0) }
            70% { transform: scale(1.25) }
            100% { transform: scale(1) }
        }
    </style>
</head>

<body>
    <button class="botao-voltar" id="botaoVoltar" title="Voltar">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M15 5 L8 12 L15 19" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
        Voltar
    </button>
    <button class="botao-som" id="botaoSom" title="Ligar ou desligar a voz"></button>

    <div class="card">
        <div class="topo">
            <div class="pim-circulo" id="pimCirculo">
                <svg viewBox="0 0 100 100">
                    <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
                    <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
                    <rect x="20" y="18" width="60" height="50" rx="22" fill="#A29BFE" />
                    <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
                    <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
                    <circle cx="40" cy="40" r="3" fill="#fff" />
                    <circle cx="64" cy="40" r="3" fill="#fff" />
                    <circle cx="28" cy="54" r="5" fill="#FFB8C4" opacity=".7" />
                    <circle cx="72" cy="54" r="5" fill="#FFB8C4" opacity=".7" />
                    <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"
                        fill="none" />
                    <rect x="34" y="68" width="32" height="22" rx="10" fill="#6C5CE7" />
                    <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
                </svg>
            </div>
            <div class="titulo">Some as balas! 🍬</div>
        </div>

        <div class="conta">
            <div class="grupo" id="grupoA"></div>
            <div class="operador">+</div>
            <div class="grupo" id="grupoB"></div>
            <div class="igual">=</div>
            <div class="prato" id="prato"></div>
        </div>

        <div class="placar" id="placar">Toque no número da resposta!</div>

        <!-- NOVO: teclado numérico -->
        <div class="teclado" id="teclado"></div>

        <button class="btn-acao" id="btnAcao">Conferir</button>

        <div class="festa" id="festa"></div>
    </div>

    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script>
        // ===== CREDENCIAIS (TROQUE pela sua chave!) =====
        const AZURE_KEY = "7YseDwXlpfBRO2meYxBwULsbO5mNhv4uqxdUhXtwef1jRBmcGzXeJQQJ99CFACHrzpqXJ3w3AAAYACOG87Cv";
        const AZURE_REGION = "northcentralus";
        const VOZ = "pt-BR-ThalitaNeural";
        // ================================================

        const pimCirculo = document.getElementById('pimCirculo');
        const botaoSom = document.getElementById('botaoSom');
        const grupoA = document.getElementById('grupoA');
        const grupoB = document.getElementById('grupoB');
        const prato = document.getElementById('prato');
        const placar = document.getElementById('placar');
        const festa = document.getElementById('festa');
        const teclado = document.getElementById('teclado');
        const btnAcao = document.getElementById('btnAcao');

        let somLigado = localStorage.getItem('somLigado') !== 'false';
        let a = 0, b = 0, resposta = 0, colocadas = 0, acertou = false;

        const ICONE_LIGADO = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#6C5CE7"/><path d="M16 9 a4 4 0 0 1 0 6" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M18.5 6.5 a8 8 0 0 1 0 11" stroke="#A29BFE" stroke-width="2" stroke-linecap="round" fill="none"/></svg>`;
        const ICONE_MUDO = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#D63031"/><line x1="16" y1="9" x2="22" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/><line x1="22" y1="9" x2="16" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/></svg>`;

        function atualizarSom() { botaoSom.innerHTML = somLigado ? ICONE_LIGADO : ICONE_MUDO; botaoSom.classList.toggle('mudo', !somLigado); }
        atualizarSom();
        botaoSom.addEventListener('click', () => { somLigado = !somLigado; localStorage.setItem('somLigado', somLigado); atualizarSom(); });

        function falar(texto) {
            return new Promise(resolve => {
                if (!somLigado) { resolve(); return; }
                pimCirculo.classList.add('falando');
                const cfg = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
                cfg.speechSynthesisVoiceName = VOZ;
                const synth = new SpeechSDK.SpeechSynthesizer(cfg);
                let fim = false;
                const acabar = () => { if (fim) return; fim = true; pimCirculo.classList.remove('falando'); try { synth.close() } catch (e) { } resolve(); };
                const ssml = `<speak version='1.0' xml:lang='pt-BR'><voice name='${VOZ}'><prosody rate='0%' pitch='+6%'>${texto}</prosody></voice></speak>`;
                synth.speakSsmlAsync(ssml,
                    r => { if (r.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) { setTimeout(acabar, r.audioDuration / 10000 + 300); } else acabar(); },
                    e => { console.error(e); acabar(); });
            });
        }

        function bolinhas(qtd) { let html = ''; for (let i = 0; i < qtd; i++) html += '<span class="bala">🍬</span>'; return html; }

        // Cria o teclado de 0 a 10 uma única vez
        function criarTeclado() {
            teclado.innerHTML = '';
            for (let n = 0; n <= 10; n++) {
                const btn = document.createElement('button');
                btn.className = 'btn-num';
                btn.textContent = n;
                btn.dataset.valor = n;
                btn.addEventListener('click', () => escolherNumero(n, btn));
                teclado.appendChild(btn);
            }
        }

        function escolherNumero(n, btn) {
            if (acertou) return;
            colocadas = n;
            // destaca o botão selecionado
            document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('selecionado'));
            btn.classList.add('selecionado');
            // mostra as balas direto no prato
            desenharPrato();
            atualizarPlacar();
        }

        function novaConta() {
            acertou = false;
            colocadas = 0;
            a = Math.floor(Math.random() * 5) + 1;
            b = Math.floor(Math.random() * 5) + 1;
            resposta = a + b;
            grupoA.innerHTML = bolinhas(a);
            grupoB.innerHTML = bolinhas(b);
            prato.innerHTML = '';
            prato.classList.remove('certo');
            festa.classList.remove('show'); festa.textContent = '';
            btnAcao.textContent = 'Conferir';
            document.querySelectorAll('.btn-num').forEach(b => b.classList.remove('selecionado'));
            atualizarPlacar();
        }

        function atualizarPlacar() {
            if (colocadas === 0) {
                placar.textContent = 'Toque no número da resposta!';
            } else {
                placar.textContent = `Você escolheu: ${colocadas}`;
            }
        }

        function desenharPrato() { prato.innerHTML = bolinhas(colocadas); }

        btnAcao.addEventListener('click', async () => {
            if (acertou) { novaConta(); await falar('Vamos para a próxima conta!'); return; }
            if (colocadas === resposta) {
                acertou = true;
                prato.classList.add('certo');
                festa.textContent = '🎉⭐🎉';
                festa.classList.add('show');
                btnAcao.textContent = 'Próxima ➜';
                await falar(`Muito bem! ${a} mais ${b} é igual a ${resposta}!`);
            } else if (colocadas < resposta) {
                await falar('Quase! Conte as balas e escolha um número maior.');
            } else {
                await falar('Opa! Esse número é grande demais. Tente um menor.');
            }
        });

        document.getElementById('botaoVoltar').addEventListener('click', () => {
            window.location.href = '../paginamatematica.html';
        });

        async function iniciar() {
            criarTeclado();
            novaConta();
            await falar('Conte as balas dos dois lados e toque no número da resposta!');
        }
        iniciar();
    </script>
</body>

</html>
