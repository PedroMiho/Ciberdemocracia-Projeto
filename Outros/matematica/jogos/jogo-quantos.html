<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantos Tem?</title>

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primaria: #6C5CE7;
            --texto: #4A4A68;
        }

        * {
            font-family: 'Baloo 2', cursive;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at 20% 20%, #E8E4FF 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #D4F1FF 0%, transparent 50%),
                linear-gradient(160deg, #F5F3FF 0%, #EBF7FF 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .botao-som,
        .botao-voltar {
            position: fixed;
            top: 18px;
            z-index: 500;
            border: none;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.25);
            transition: transform 0.18s ease;
        }

        .botao-som {
            right: 18px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .botao-som svg {
            width: 30px;
            height: 30px;
        }

        .botao-som.mudo {
            background: #FFE3E1;
        }

        .botao-voltar {
            left: 18px;
            height: 56px;
            padding: 0 22px 0 16px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primaria);
            font-size: 18px;
            font-weight: 700;
        }

        .botao-som:hover,
        .botao-voltar:hover {
            transform: scale(1.06);
        }

        .botao-som:active,
        .botao-voltar:active {
            transform: scale(0.92);
        }

        .botao-voltar svg {
            width: 26px;
            height: 26px;
        }

        .pim-circulo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.35);
            margin-bottom: 10px;
        }

        .pim-circulo svg {
            width: 38px;
            height: 38px;
        }

        .pim-circulo.falando svg {
            animation: pula 0.45s ease-in-out infinite;
        }

        @keyframes pula {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-4px) scale(1.08);
            }
        }

        .palco {
            background: #fff;
            border-radius: 36px;
            padding: 26px 24px 30px;
            box-shadow: 0 16px 44px rgba(108, 92, 231, 0.18);
            max-width: 580px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .titulo-jogo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primaria);
        }

        /* área onde os bichinhos aparecem */
        .cena {
            background: linear-gradient(160deg, #FFF9EC 0%, #F0FBFF 100%);
            border: 3px dashed #E0DAFF;
            border-radius: 26px;
            width: 100%;
            min-height: 200px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 22px;
        }

        .item {
            font-size: 64px;
            animation: entra 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes entra {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0;
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .item {
                font-size: 48px;
            }
        }

        .mensagem {
            font-size: 22px;
            font-weight: 700;
            color: var(--texto);
            min-height: 30px;
        }

        .opcoes {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .opcao {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            border: none;
            font-size: 44px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(160deg, #74B9FF 0%, #0984E3 100%);
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(9, 132, 227, 0.3);
            transition: transform 0.15s ease;
        }

        .opcao:hover {
            transform: translateY(-4px);
        }

        .opcao:active {
            transform: scale(0.92);
        }

        .opcao.certa {
            background: linear-gradient(160deg, #00B894 0%, #009975 100%);
            animation: pulinho 0.5s ease;
        }

        .opcao.errada {
            background: linear-gradient(160deg, #FF7675 0%, #D63031 100%);
            animation: tremor 0.4s ease;
        }

        @keyframes pulinho {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        @keyframes tremor {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .opcoes.travado .opcao {
            pointer-events: none;
        }

        .controles {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            border-radius: 26px;
            padding: 14px 28px;
            font-size: 19px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            transition: transform 0.16s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .btn-iniciar {
            background: linear-gradient(160deg, #00B894 0%, #009975 100%);
        }

        .btn-repetir {
            background: linear-gradient(160deg, #A29BFE 0%, #6C5CE7 100%);
        }

        /* estrelinhas de progresso (rodadas) */
        .estrelas {
            display: flex;
            gap: 8px;
        }

        .estrela {
            font-size: 26px;
            filter: grayscale(1);
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .estrela.ganha {
            filter: none;
            opacity: 1;
            transform: scale(1.2);
        }

        .festa {
            font-size: 56px;
            display: none;
        }

        .festa.aparece {
            display: block;
            animation: festa 0.8s ease infinite alternate;
        }

        @keyframes festa {
            0% {
                transform: scale(1) rotate(-6deg);
            }

            100% {
                transform: scale(1.15) rotate(6deg);
            }
        }
    </style>
</head>

<body>

    <button class="botao-voltar" id="botaoVoltar" title="Voltar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 5 L8 12 L15 19" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
        Voltar
    </button>

    <button class="botao-som" id="botaoSom" title="Ligar ou desligar a voz"></button>

    <div class="pim-circulo" id="pimCirculo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <line x1="50" y1="18" x2="50" y2="6" stroke="#fff" stroke-width="4" stroke-linecap="round" />
            <circle cx="50" cy="5" r="5" fill="#FDCB6E" />
            <rect x="20" y="18" width="60" height="50" rx="22" fill="#fff" />
            <circle cx="38" cy="42" r="8" fill="#6C5CE7" />
            <circle cx="62" cy="42" r="8" fill="#6C5CE7" />
            <circle cx="40" cy="40" r="3" fill="#fff" />
            <circle cx="64" cy="40" r="3" fill="#fff" />
            <path d="M42 56 Q50 62 58 56" stroke="#6C5CE7" stroke-width="3" stroke-linecap="round" fill="none" />
            <rect x="34" y="68" width="32" height="22" rx="10" fill="#A29BFE" />
            <circle cx="50" cy="79" r="4" fill="#FDCB6E" />
        </svg>
    </div>

    <div class="palco">

        <div class="titulo-jogo">Quantos Tem? 🔢</div>

        <div class="estrelas" id="estrelas"></div>

        <div class="cena" id="cena"></div>

        <div class="festa" id="festa">🎉🌟🎉</div>

        <div class="mensagem" id="mensagem">Toque em "Começar" para brincar!</div>

        <div class="opcoes" id="opcoes"></div>

        <div class="controles">
            <button class="btn btn-iniciar" id="btnIniciar">▶️ Começar</button>
            <button class="btn btn-repetir" id="btnRepetir" style="display:none;">🔁 Jogar de novo</button>
        </div>

    </div>

    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script>
        // ===== CREDENCIAIS (TROQUE pela sua chave!) =====
        const AZURE_KEY = "COLE_SUA_CHAVE_AQUI";
        const AZURE_REGION = "northcentralus";
        const VOZ = "pt-BR-ThalitaNeural";
        // ================================================

        const pimCirculo = document.getElementById('pimCirculo');
        const botaoSom = document.getElementById('botaoSom');
        const botaoVoltar = document.getElementById('botaoVoltar');
        const cena = document.getElementById('cena');
        const mensagem = document.getElementById('mensagem');
        const opcoesEl = document.getElementById('opcoes');
        const estrelasEl = document.getElementById('estrelas');
        const festa = document.getElementById('festa');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnRepetir = document.getElementById('btnRepetir');

        let somLigado = localStorage.getItem('somLigado') !== 'false';
        let rodando = false;

        const TOTAL_RODADAS = 5;
        let rodadaAtual = 0;
        let respostaCerta = 0;
        let podeResponder = false;

        // bichinhos/objetos: emoji + nome no singular + plural
        const ITENS = [
            { emoji: '🐶', sing: 'cachorro', plur: 'cachorros' },
            { emoji: '🐱', sing: 'gato', plur: 'gatos' },
            { emoji: '🐰', sing: 'coelho', plur: 'coelhos' },
            { emoji: '🐸', sing: 'sapo', plur: 'sapos' },
            { emoji: '🐥', sing: 'pintinho', plur: 'pintinhos' },
            { emoji: '🦋', sing: 'borboleta', plur: 'borboletas' },
            { emoji: '🐟', sing: 'peixe', plur: 'peixes' },
            { emoji: '🍎', sing: 'maçã', plur: 'maçãs' },
            { emoji: '⭐', sing: 'estrela', plur: 'estrelas' },
            { emoji: '🌸', sing: 'flor', plur: 'flores' },
        ];

        const ICONE_SOM_LIGADO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#6C5CE7"/>
        <path d="M16 9 a4 4 0 0 1 0 6" stroke="#6C5CE7" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M18.5 6.5 a8 8 0 0 1 0 11" stroke="#A29BFE" stroke-width="2" stroke-linecap="round" fill="none"/>
      </svg>`;
        const ICONE_SOM_MUDO = `
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9 H8 L13 5 V19 L8 15 H4 Z" fill="#D63031"/>
        <line x1="16" y1="9" x2="22" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
        <line x1="22" y1="9" x2="16" y2="15" stroke="#D63031" stroke-width="2" stroke-linecap="round"/>
      </svg>`;

        function atualizarBotaoSom() {
            botaoSom.innerHTML = somLigado ? ICONE_SOM_LIGADO : ICONE_SOM_MUDO;
            botaoSom.classList.toggle('mudo', !somLigado);
        }
        atualizarBotaoSom();
        botaoSom.addEventListener('click', () => {
            somLigado = !somLigado;
            localStorage.setItem('somLigado', somLigado);
            atualizarBotaoSom();
        });

        function pausa(ms) { return new Promise(r => setTimeout(r, ms)); }

        function falar(texto) {
            return new Promise(resolve => {
                if (!somLigado) { resolve(); return; }
                pimCirculo.classList.add('falando');
                const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(AZURE_KEY, AZURE_REGION);
                speechConfig.speechSynthesisVoiceName = VOZ;
                const synth = new SpeechSDK.SpeechSynthesizer(speechConfig);
                let fim = false;
                function finalizar() {
                    if (fim) return; fim = true;
                    pimCirculo.classList.remove('falando');
                    try { synth.close(); } catch (e) { }
                    resolve();
                }
                const ssml = `
          <speak version='1.0' xml:lang='pt-BR'>
            <voice name='${VOZ}'>
              <prosody rate='-5%' pitch='+6%'>${texto}</prosody>
            </voice>
          </speak>`;
                synth.speakSsmlAsync(ssml,
                    (r) => {
                        if (r.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted)
                            setTimeout(finalizar, r.audioDuration / 10000 + 250);
                        else finalizar();
                    },
                    (e) => { console.error(e); finalizar(); }
                );
            });
        }

        function embaralhar(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function criarEstrelas() {
            estrelasEl.innerHTML = '';
            for (let i = 0; i < TOTAL_RODADAS; i++) {
                const e = document.createElement('span');
                e.className = 'estrela';
                e.textContent = '⭐';
                e.dataset.i = i;
                estrelasEl.appendChild(e);
            }
        }
        function ganharEstrela(i) {
            const e = estrelasEl.querySelector(`.estrela[data-i="${i}"]`);
            if (e) e.classList.add('ganha');
        }

        // gera as 3 opções: a certa + 2 diferentes (1 a 5)
        function gerarOpcoes(certa) {
            const opcoes = new Set([certa]);
            while (opcoes.size < 3) {
                opcoes.add(Math.floor(Math.random() * 5) + 1);
            }
            return embaralhar([...opcoes]);
        }

        async function montarRodada() {
            podeResponder = false;
            opcoesEl.classList.add('travado');
            festa.classList.remove('aparece');

            // sorteia item e quantidade (1 a 5)
            const item = ITENS[Math.floor(Math.random() * ITENS.length)];
            respostaCerta = Math.floor(Math.random() * 5) + 1;

            // desenha os itens na cena
            cena.innerHTML = '';
            for (let i = 0; i < respostaCerta; i++) {
                const el = document.createElement('div');
                el.className = 'item';
                el.style.animationDelay = (i * 0.12) + 's';
                el.textContent = item.emoji;
                cena.appendChild(el);
            }

            const nome = respostaCerta === 1 ? item.sing : item.plur;
            mensagem.textContent = `Quantos ${nome} tem na tela?`;

            // monta os botões de opção
            opcoesEl.innerHTML = '';
            const opcoes = gerarOpcoes(respostaCerta);
            opcoes.forEach(num => {
                const b = document.createElement('button');
                b.className = 'opcao';
                b.textContent = num;
                b.addEventListener('click', () => responder(num, b, nome));
                opcoesEl.appendChild(b);
            });

            await pausa(300);
            await falar(`Olha só! Quantos ${nome} tem na tela? Conte e toque no número certo.`);

            podeResponder = true;
            opcoesEl.classList.remove('travado');
        }

        async function responder(num, botao, nome) {
            if (!podeResponder) return;
            podeResponder = false;
            opcoesEl.classList.add('travado');

            if (num === respostaCerta) {
                botao.classList.add('certa');
                ganharEstrela(rodadaAtual);
                mensagem.textContent = `Isso! São ${respostaCerta} ${nome}! 🎉`;
                await falar(`Muito bem! São ${respostaCerta} ${nome}!`);
                await pausa(400);
                rodadaAtual++;

                if (rodadaAtual >= TOTAL_RODADAS) {
                    terminarJogo();
                } else {
                    montarRodada();
                }
            } else {
                botao.classList.add('errada');
                mensagem.textContent = 'Vamos contar juntos de novo! 💜';
                await falar('Quase! Vamos contar de novo, um por um.');
                await pausa(600);
                botao.classList.remove('errada');
                podeResponder = true;
                opcoesEl.classList.remove('travado');
            }
        }

        async function terminarJogo() {
            rodando = false;
            cena.innerHTML = '';
            opcoesEl.innerHTML = '';
            mensagem.textContent = 'Você contou tudo certinho! Parabéns! 🎉';
            festa.classList.add('aparece');
            await falar('Parabéns! Você contou tudo muito bem! Você é incrível!');
            localStorage.setItem('jogo_quantos_concluido', 'true');
            btnRepetir.style.display = 'flex';
            btnIniciar.disabled = false;
        }

        async function jogar() {
            rodando = true;
            rodadaAtual = 0;
            btnIniciar.disabled = true;
            btnRepetir.style.display = 'none';
            criarEstrelas();
            await falar('Vamos contar os bichinhos! Conte com calma.');
            montarRodada();
        }

        btnIniciar.addEventListener('click', () => { if (!rodando) jogar(); });
        btnRepetir.addEventListener('click', () => jogar());

        botaoVoltar.addEventListener('click', () => {
            rodando = false;
            window.location.href = '../paginamatematica.html';
        });

        // estado inicial
        criarEstrelas();
    </script>

</body>

</html>
